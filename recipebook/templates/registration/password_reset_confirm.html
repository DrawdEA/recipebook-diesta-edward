{% extends 'base.html' %}

{% block title %}Set new password{% endblock %}

{% block page_heading %}Set new password{% endblock %}

{% block content %}
  {% if validlink %}
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <input type="submit" value="Change password">
    </form>
  {% else %}
    <p>Invalid password reset link!</p>
  {% endif %}
{% endblock %}
