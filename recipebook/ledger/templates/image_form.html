{% extends 'base.html' %}

{% block title %}Add image{% endblock %}

{% block page_heading %}Add image to {{ recipe.name }}{% endblock %}

{% block content %}
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
  </form>
  <p><a href="{% url 'ledger:recipe_detail' recipe.pk %}">Back to recipe</a></p>
{% endblock %}
