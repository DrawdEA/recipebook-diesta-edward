{% extends 'base.html' %}

{% block page_heading %}Recipes{% endblock %}

{% block content %}
  {% if user.is_authenticated %}
    <p><a href="{% url 'ledger:recipe_add' %}">Add recipe</a></p>
  {% endif %}
  <ul>
    {% for recipe in recipes %}
      <li>
        <a href="{{ recipe.get_absolute_url }}">{{ recipe.name }}</a>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
